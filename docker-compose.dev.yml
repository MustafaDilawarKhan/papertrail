services:
  # One-shot job: applies any pending schema changes against Supabase.
  # Idempotent — every statement uses `IF NOT EXISTS` so re-running is free.
  # The backend service waits for this to exit with status 0 before it starts.
  migrate:
    build: ./backend
    container_name: aid-migrate-dev
    command: python alter_db.py
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    restart: "no"

  backend:
    build: ./backend
    container_name: aid-backend-dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    image: node:18-alpine
    container_name: aid-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
