services:
  backend:
    build: ./backend
    container_name: aid-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: aid-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
