<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Paper Trail — Research Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="shared/config.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { font-family: 'Manrope', sans-serif; background: #F5F5F7; color: #1A1A1A; }
  .material-symbols-outlined { font-size: 20px; vertical-align: middle; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  *::-webkit-scrollbar-track { background: transparent; }
  input, textarea { font-family: inherit; }
  kbd { font-family: ui-monospace, monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="shared/components.jsx"></script>
<script type="text/babel" src="pages/app-pages.jsx"></script>
<script type="text/babel" src="pages/auth-pages.jsx"></script>
<script type="text/babel" src="pages/admin-pages.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useEffect } = React;

// ---- Route table ----
const routes = [
  { match: /^\/?$/, comp: () => <LandingRedirect /> },
  { match: /^\/login\/?$/, comp: () => <LoginPage /> },
  { match: /^\/register\/?$/, comp: () => <RegisterPage /> },
  { match: /^\/verify\/?$/, comp: () => <VerifyPage /> },
  { match: /^\/forgot\/?$/, comp: () => <LoginPage /> },
  { match: /^\/dashboard\/?$/, comp: () => <DashboardPage /> },
  { match: /^\/library\/?$/, comp: () => <LibraryPage /> },
  { match: /^\/library\/(.+?)\/(.+?)\/?$/, comp: (p) => <DocViewerPage params={p} /> },
  { match: /^\/upload\/?$/, comp: () => <UploadPage /> },
  { match: /^\/workspaces\/?$/, comp: () => <WorkspacesPage /> },
  { match: /^\/workspaces\/(.+?)\/?$/, comp: (p) => <WorkspaceDetailPage params={p} /> },
  { match: /^\/settings\/?$/, comp: () => <SettingsPage /> },
  { match: /^\/upgrade\/?$/, comp: () => <UpgradePage /> },
  { match: /^\/help\/?$/, comp: () => <HelpPage /> },
  { match: /^\/admin\/?$/, comp: () => <AdminOverviewPage /> },
  { match: /^\/admin\/users\/?$/, comp: () => <AdminUsersPage /> },
  { match: /^\/admin\/models\/?$/, comp: () => <AdminModelsPage /> },
  { match: /^\/admin\/flags\/?$/, comp: () => <AdminFlagsPage /> },
  { match: /^\/admin\/logs\/?$/, comp: () => <AdminLogsPage /> },
  { match: /^\/admin\/health\/?$/, comp: () => <AdminHealthPage /> },
];

function LandingRedirect() {
  useEffect(() => { navigate("/login"); }, []);
  return null;
}

function HelpPage() {
  return (
    <AppShell active="help" breadcrumbs={[{ label: "Help" }]}>
      <h1 className="font-section-heading text-section-heading text-primary mb-2">Help &amp; Resources</h1>
      <p className="text-on-surface-variant mb-8">Guides, shortcuts, and direct support.</p>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
        {[
          { icon: "school", title: "Getting Started", desc: "5-min tour of the research workspace." },
          { icon: "menu_book", title: "Citation Guide", desc: "How sources, chips, and BibTeX work." },
          { icon: "keyboard", title: "Keyboard Shortcuts", desc: "Move faster across library and chat." },
          { icon: "api", title: "API Reference", desc: "For Lab plan integrations." },
          { icon: "forum", title: "Community", desc: "Ask researchers like you." },
          { icon: "support", title: "Contact Support", desc: "Reply within 1 business day." },
        ].map((c, i) => (
          <button key={i} className="bg-white border border-border-subtle p-5 rounded-xl text-left hover:shadow-md transition-shadow">
            <div className="w-10 h-10 rounded-lg bg-secondary-container flex items-center justify-center text-primary mb-4"><Icon name={c.icon} filled /></div>
            <h4 className="font-bold mb-1">{c.title}</h4>
            <p className="text-xs text-on-surface-variant">{c.desc}</p>
          </button>
        ))}
      </div>
      <div className="bg-primary text-on-primary rounded-2xl p-8 flex items-center justify-between">
        <div>
          <p className="text-xs uppercase tracking-widest font-bold opacity-60 mb-2">Live Office Hours</p>
          <p className="text-xl font-bold mb-1">Thursdays · 11am PT</p>
          <p className="text-sm opacity-80">Drop in with our team to talk research workflows.</p>
        </div>
        <button className="bg-white text-primary px-5 py-2.5 rounded-full text-xs font-bold">Add to Calendar</button>
      </div>
    </AppShell>
  );
}

function App() {
  const route = useRoute();
  for (const r of routes) {
    const m = route.match(r.match);
    if (m) return r.comp(m.slice(1));
  }
  return (
    <div className="min-h-screen flex items-center justify-center">
      <div className="text-center">
        <h1 className="font-section-heading text-section-heading text-primary mb-2">404</h1>
        <p className="text-on-surface-variant mb-6">No route matches <code className="font-mono bg-surface-container px-2 py-1 rounded">{route}</code></p>
        <Link to="/dashboard" className="bg-primary text-white px-5 py-2 rounded-full text-xs font-bold">Go home</Link>
      </div>
    </div>
  );
}

// Wait for components.jsx + page files to load
const tryMount = () => {
  if (typeof DashboardPage === "undefined" || typeof LoginPage === "undefined" || typeof AdminOverviewPage === "undefined" || typeof useRoute === "undefined") {
    return setTimeout(tryMount, 30);
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
};
tryMount();
</script>
</body>
</html>
